name: Build, Push and Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Trigger workflow on pushes to main branch

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          # Dynamic tag using Docker Hub Username from secrets
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into EC2 & Deploy Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            echo "==== Log into Docker Hub ===="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            echo "==== Pulling latest Docker image ===="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-app:latest
            
            echo "==== Stopping and removing old container (if exists) ===="
            docker stop telco-churn-app || true
            docker rm telco-churn-app || true
            
            echo "==== Starting new container ===="
            docker run -d \
              --name telco-churn-app \
              -p 8000:8000 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-app:latest
            
            echo "==== Pruning old unused images ===="
            docker image prune -f
            
            echo "==== Deployment Completed Successfully ===="
